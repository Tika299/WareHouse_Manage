version: '3.8'
services:

  # 1. PHP App
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: business-manage-app
    container_name: erp-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - erp-network

  # 2. Web Server (Nginx)
  webserver:
    image: nginx:alpine
    container_name: erp-webserver
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker-config/nginx:/etc/nginx/conf.d
    networks:
      - erp-network

  # 3. Database (MySQL)
  db:
    image: mysql:8.0
    container_name: erp-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: manage
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_USER: user
    volumes:
      - dbdata:/var/lib/mysql
      - ./manage.sql:/docker-entrypoint-initdb.d/manage.sql
    networks:
      - erp-network

networks:
  erp-network:
    driver: bridge

volumes:
  dbdata:
    driver: local